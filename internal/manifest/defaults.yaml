render:
  defaults:
    tools: ["resvg", "rsvg-convert", "inkscape", "vips-transform", "magick-transform", "vips-encode", "magick-encode", "oxipng", "gifsicle", "jpegoptim", "cwebp"]
  optimize_by_format:
    .png: "oxipng"
    .gif: "gifsicle"
    .jpg: "jpegoptim"
    .jpeg: "jpegoptim"
    .webp: "cwebp"
  tools:
    resvg:
      tool: "resvg"
      accepts: [".svg"]
      produces: [".png"]
      scale_modes: ["fit"]
      sets_size: "--width {width} --height {height}"
      command: "resvg {sets_size} {input} {output}"
    rsvg-convert:
      tool: "rsvg-convert"
      accepts: [".svg"]
      produces: [".png"]
      scale_modes: ["fit"]
      command: "rsvg-convert -w {width} -h {height} -o {output} {input}"
    inkscape:
      tool: "inkscape"
      accepts: [".svg", ".eps"]
      produces: [".png"]
      scale_modes: ["fit"]
      command: "inkscape {input} --export-filename={output} --export-width={width} --export-height={height}"
    vips-transform:
      tool: "vips"
      accepts: [".png", ".jpg", ".jpeg", ".webp", ".gif"]
      produces: [".png", ".jpg", ".jpeg", ".webp", ".gif"]
      scale_modes: ["fit", "fill", "stretch", "crop"]
      command: "vips resize {input} {output} {scale}"
    magick-transform:
      tool: "magick"
      # TODO(bramp): Query ImageMagick capabilities (for example via
      # `magick -list format`) so accepts/produces reflect runtime support
      # instead of this static bitmap list.
      accepts: [".png", ".jpg", ".jpeg", ".webp", ".gif", ".bmp", ".tif", ".tiff"]
      produces: [".png", ".jpg", ".jpeg", ".webp", ".gif", ".bmp", ".tif", ".tiff"]
      scale_modes: ["fit", "fill", "stretch", "crop"]
      command: "magick {input} {resize_args} {output}"
    vips-encode:
      tool: "vips"
      accepts: [".png", ".jpg", ".jpeg", ".webp"]
      produces: [".png", ".jpg", ".jpeg", ".webp"]
      command: "vips copy {input} {output}"
    magick-encode:
      tool: "magick"
      accepts: [".png", ".jpg", ".jpeg", ".webp", ".gif", ".bmp", ".tif", ".tiff"]
      produces: [".png", ".jpg", ".jpeg", ".webp", ".gif", ".bmp", ".tif", ".tiff"]
      command: "magick {input} {output}"
    oxipng:
      tool: "oxipng"
      accepts: [".png"]
      produces: [".png"]
      command: "oxipng -o 3 --strip safe --out {output} {input}"
    gifsicle:
      tool: "gifsicle"
      accepts: [".gif"]
      produces: [".gif"]
      command: "gifsicle -O3 {input} -o {output}"
    jpegoptim:
      tool: "jpegoptim"
      accepts: [".jpg", ".jpeg"]
      produces: [".jpg", ".jpeg"]
      command: "cp {input} {output} && jpegoptim --strip-all {output}"
    cwebp:
      tool: "cwebp"
      accepts: [".webp"]
      produces: [".webp"]
      command: "cwebp -quiet -q 82 {input} -o {output}"
